<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Drive Sekolah - Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        :root { --primary: #2563eb; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .category-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; }
        .category-card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .category-card.active { border-color: var(--primary); background: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.1); }
        .animate-view { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center h-8">
                <div class="flex items-center space-x-2 cursor-pointer" onclick="location.reload()">
                    <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fas fa-sync-alt"></i></div>
                    <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">SDN SIDOMULYO</span>
                </div>
                <div id="sync-status" class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center">
                    <span id="status-dot" class="w-2 h-2 bg-yellow-400 rounded-full mr-2"></span> 
                    <span id="status-text">Menghubungkan...</span>
                </div>
            </div>
        </div>
    </nav>

    <main id="view-user" class="max-w-5xl mx-auto px-4 py-8 animate-view">
        <header class="text-center mb-12">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-3">Pusat Data Terpadu SDN SIDOMULYO Kec. Semen</h1>
            <p class="text-slate-500 italic text-sm">Silakan pilih kategori di bawah untuk mengakses file.</p>
        </header>

        <!-- Pencarian (Disembunyikan saat awal) -->
        <div id="search-container" class="max-w-md mx-auto mb-10 hidden">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="search-input" oninput="handleSearch()" placeholder="Cari judul file..." class="w-full pl-12 pr-4 py-3 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all glass-card">
            </div>
        </div>

        <!-- Tombol Kategori -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-12">
            <div id="btn-file" onclick="setCategory('File Sekolah')" class="category-card glass-card p-6 rounded-2xl cursor-pointer text-center group">
                <div class="w-16 h-16 bg-amber-50 text-amber-500 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:bg-amber-500 group-hover:text-white transition-all"><i class="fas fa-folder-open text-2xl"></i></div>
                <h3 class="font-bold text-slate-800 text-sm">File Sekolah</h3>
            </div>
            <div id="btn-foto" onclick="setCategory('Foto Sekolah')" class="category-card glass-card p-6 rounded-2xl cursor-pointer text-center group">
                <div class="w-16 h-16 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:bg-blue-500 group-hover:text-white transition-all"><i class="fas fa-images text-2xl"></i></div>
                <h3 class="font-bold text-slate-800 text-sm">Foto Sekolah</h3>
            </div>
            <div id="btn-lain" onclick="setCategory('Data Lain-lain')" class="category-card glass-card p-6 rounded-2xl cursor-pointer text-center group">
                <div class="w-16 h-16 bg-indigo-50 text-indigo-500 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:bg-indigo-500 group-hover:text-white transition-all"><i class="fas fa-layer-group text-2xl"></i></div>
                <h3 class="font-bold text-slate-800 text-sm">Data Lain-lain</h3>
            </div>
        </div>

        <div id="result-header" class="hidden flex items-center justify-between mb-6">
            <div class="flex items-center space-x-2">
                <div class="w-1 h-6 bg-blue-600 rounded-full"></div>
                <h2 id="view-title" class="text-xl font-bold text-slate-800 uppercase tracking-tight font-bold text-blue-600">Pilih Kategori</h2>
            </div>
            <button onclick="resetDisplay()" id="btn-reset" class="text-sm font-semibold text-blue-600 hover:underline">
                Tutup <i class="fas fa-times ml-1 text-[10px]"></i>
            </button>
        </div>

        <!-- Grid Container -->
        <div id="grid-user" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 min-h-[100px]">
            <!-- Pesan Sambutan Awal -->
            <div id="initial-message" class="col-span-full py-16 text-center animate-view">
                <div class="w-20 h-20 bg-blue-50 text-blue-400 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-mouse-pointer text-3xl"></i>
                </div>
                <p class="text-slate-400 font-medium">Klik salah satu kategori di atas untuk menampilkan data</p>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwLBvQyT2kTOGO_NU5s4ysBxNYwIIYjplxsjka-HDKA3vW3Ky9IzWQIaHh1v3691qwj/exec';

        let driveData = [];
        let currentFilter = null; // Diubah menjadi null agar tidak menampilkan data di awal
        let searchQuery = '';

        const normalize = (str) => str ? str.toString().toLowerCase().trim() : "";

        async function fetchSheetData() {
            try {
                updateStatus('Sinkronisasi...', 'yellow');
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network error');
                
                const result = await response.json();
                
                driveData = Object.keys(result).flatMap(key => {
                    return result[key].map(item => ({
                        title: item.title ? item.title.toString().trim() : "Tanpa Judul",
                        url: item.url ? item.url.toString().trim() : "#",
                        category: key.trim()
                    }));
                }).filter(item => item.url.startsWith('http'));
                
                updateStatus('Terhubung', 'green');
                // Tidak memanggil renderUserGrid di sini agar tetap kosong saat awal
            } catch (error) {
                console.error('Error Sync:', error);
                updateStatus('Gagal Sinkron', 'red');
            }
        }

        function handleSearch() {
            searchQuery = normalize(document.getElementById('search-input').value);
            renderUserGrid();
        }

        function renderUserGrid() {
            const grid = document.getElementById('grid-user');
            const initialMsg = document.getElementById('initial-message');
            const resHeader = document.getElementById('result-header');
            const searchCont = document.getElementById('search-container');
            
            // Sembunyikan pesan awal jika kategori sudah dipilih
            if (currentFilter) {
                if (initialMsg) initialMsg.remove();
                resHeader.classList.remove('hidden');
                searchCont.classList.remove('hidden');
            } else {
                return; // Jangan lakukan apa-apa jika belum ada kategori yang dipilih
            }

            let filteredData = driveData.filter(item => {
                const matchesCategory = normalize(item.category) === normalize(currentFilter);
                const matchesSearch = !searchQuery || normalize(item.title).includes(searchQuery);
                return matchesCategory && matchesSearch;
            });
            
            if (filteredData.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center animate-view">
                        <i class="fas fa-search text-slate-200 text-5xl mb-4"></i>
                        <p class="text-slate-400 italic text-sm">Tidak ada data ditemukan dalam kategori ini.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredData.map(item => `
                <div class="glass-card p-5 rounded-3xl flex items-center justify-between group hover:border-blue-300 transition-all animate-view">
                    <div class="flex items-center space-x-4 min-w-0">
                        <div class="w-12 h-12 flex-shrink-0 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition-all shadow-sm">
                            <i class="${getIcon(item.category)}"></i>
                        </div>
                        <div class="truncate">
                            <h4 class="font-bold text-slate-800 truncate text-sm leading-tight">${item.title}</h4>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">${item.category}</p>
                        </div>
                    </div>
                    <button onclick="window.open('${item.url}', '_blank')" class="w-9 h-9 flex-shrink-0 rounded-xl bg-slate-100 text-slate-500 hover:bg-blue-600 hover:text-white transition-all flex items-center justify-center shadow-sm">
                        <i class="fas fa-external-link-alt text-[10px]"></i>
                    </button>
                </div>
            `).join('');
        }

        window.setCategory = (cat) => {
            currentFilter = cat;
            
            document.getElementById('view-title').innerText = cat;
            
            document.querySelectorAll('.category-card').forEach(el => el.classList.remove('active'));
            if (cat === 'File Sekolah') document.getElementById('btn-file').classList.add('active');
            if (cat === 'Foto Sekolah') document.getElementById('btn-foto').classList.add('active');
            if (cat === 'Data Lain-lain') document.getElementById('btn-lain').classList.add('active');
            
            renderUserGrid();
        };

        window.resetDisplay = () => {
            location.reload(); // Cara termudah untuk mengembalikan ke tampilan awal yang kosong
        };

        function getIcon(cat) {
            const c = normalize(cat);
            if (c.includes('file')) return 'fas fa-file-pdf';
            if (c.includes('foto')) return 'fas fa-image';
            return 'fas fa-database';
        }

        function updateStatus(text, colorClass) {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            if (txt) txt.innerText = text;
            if (dot) {
                dot.className = `w-2 h-2 rounded-full mr-2 bg-${colorClass}-500`;
                if (colorClass === 'yellow') dot.classList.add('animate-pulse');
                else dot.classList.remove('animate-pulse');
            }
        }

        window.onload = fetchSheetData;
    </script>
</body>
</html>
